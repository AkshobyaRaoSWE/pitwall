<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>PITWALL</title>
  <meta name="description" content="PITWALL is Flighty for Formula 1: your next race, the weekend, the calendar, and live standings, in a beautiful app." />
  <meta name="theme-color" content="#f2f2f7" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%232f6bff'/%3E%3Cg fill='%23fff'%3E%3Crect x='7' y='7' width='4.5' height='4.5'/%3E%3Crect x='15' y='7' width='4.5' height='4.5'/%3E%3Crect x='11' y='12' width='4.5' height='4.5'/%3E%3Crect x='19' y='12' width='4.5' height='4.5'/%3E%3Crect x='7' y='17' width='4.5' height='4.5'/%3E%3Crect x='15' y='17' width='4.5' height='4.5'/%3E%3C/g%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css?v=2" />
</head>
<body>
  <div class="phone">
    <!-- faux status bar -->
    <div class="statusbar">
      <span class="sb__time" id="clock">9:41</span>
      <span class="sb__notch"></span>
      <span class="sb__right">
        <svg width="18" height="12" viewBox="0 0 18 12"><g fill="currentColor"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="4" y="5" width="3" height="7" rx="1"/><rect x="8" y="3" width="3" height="9" rx="1"/><rect x="12" y="1" width="3" height="11" rx="1"/></g></svg>
        <svg width="24" height="12" viewBox="0 0 24 12"><rect x="1" y="1" width="19" height="10" rx="3" fill="none" stroke="currentColor" stroke-opacity=".4"/><rect x="3" y="3" width="14" height="6" rx="1.5" fill="currentColor"/><rect x="21" y="4" width="2" height="4" rx="1" fill="currentColor" fill-opacity=".4"/></svg>
      </span>
    </div>

    <div class="app">
      <!-- UP NEXT -->
      <section class="screen is-active" id="s-next">
        <header class="lhead"><h1>Up Next</h1><span class="lhead__sub" id="nextSub">2026 season</span></header>
        <div class="pad" id="nextWrap"><div class="loading">Loading&hellip;</div></div>
      </section>

      <!-- CALENDAR -->
      <section class="screen" id="s-cal">
        <header class="lhead"><h1>Calendar</h1><span class="lhead__sub" id="calSub"></span></header>
        <div class="pad" id="calWrap"><div class="loading">Loading&hellip;</div></div>
      </section>

      <!-- STANDINGS -->
      <section class="screen" id="s-stand">
        <header class="lhead"><h1>Standings</h1></header>
        <div class="seg" id="seg">
          <button class="seg__b is-on" data-seg="drivers">Drivers</button>
          <button class="seg__b" data-seg="teams">Teams</button>
        </div>
        <div class="pad"><div id="standDrivers"><div class="loading">Loading&hellip;</div></div><div id="standTeams" hidden></div></div>
      </section>
    </div>

    <!-- tab bar -->
    <nav class="tabbar">
      <button class="tabb is-on" data-screen="s-next">
        <svg viewBox="0 0 24 24" width="24" height="24"><path d="M5 15h14l-1.5-4.5a3 3 0 0 0-2.8-2H9.3a3 3 0 0 0-2.8 2L5 15Zm0 0v2m14-2v2M8 15.5h2m4 0h2" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/><circle cx="7.5" cy="17.5" r="1.4" fill="currentColor"/><circle cx="16.5" cy="17.5" r="1.4" fill="currentColor"/></svg>
        <span>Up Next</span>
      </button>
      <button class="tabb" data-screen="s-cal">
        <svg viewBox="0 0 24 24" width="24" height="24"><rect x="4" y="5" width="16" height="15" rx="3" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="M4 9h16M8 3v4M16 3v4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
        <span>Calendar</span>
      </button>
      <button class="tabb" data-screen="s-stand">
        <svg viewBox="0 0 24 24" width="24" height="24"><path d="M7 6h10v3a5 5 0 0 1-10 0V6Z" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/><path d="M7 7H4v1a3 3 0 0 0 3 3M17 7h3v1a3 3 0 0 1-3 3M9 19h6M12 14v5" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Standings</span>
      </button>
    </nav>
  </div>

  <script src="js/app.js?v=2"></script>
</body>
</html>
